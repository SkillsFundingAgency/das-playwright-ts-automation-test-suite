trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  WORKING_DIRECTORY: 'src/smoketest'

steps:
  - checkout: self

  # ✅ Install Node.js
  - task: UseNode@1
    inputs:
      version: 24.x
    displayName: 'Install Node.js'

  # ✅ Debug: Check installed node and npm version
  - script: |
      echo "Node version:"
      node -v
      echo "Npm version:"
      npm -v
    displayName: 'Debug: Check installed node and npm version'

  # ✅ Debug: Check current working directory
  - script: |
      echo "Current directory:"
      pwd
      echo "Contents:"
      ls -la
    displayName: 'Debug: Current directory file list'
  
  # ✅ Debug working directory folder
  - script: |
      echo "Working directory contents:"
      ls -la $(WORKING_DIRECTORY)
    displayName: 'Debug: Working directory file list'

  # ✅ Update npm 
  - script: |
      npm install -g npm@latest
      npm --version
    displayName: 'Upgrade npm'

  # ✅ Install dependencies
  - script: |
      echo "Working directory path:"
      echo $(WORKING_DIRECTORY)
      npm install
    workingDirectory: $(WORKING_DIRECTORY)
    displayName: 'Install dependencies'

  # ✅ Install Playwright browsers and dependencies
  - script: |
      npx playwright install --with-deps
    workingDirectory: $(WORKING_DIRECTORY)
    displayName: 'Install Playwright browsers'

  # ✅ Run Playwright tests
  - script: |
      npx playwright test
    workingDirectory: $(WORKING_DIRECTORY)
    displayName: 'Run Playwright tests'
    env:
      LiveEasUser: $(LiveEasUser)
      MailasourDeviceConfig: $(MailasourDeviceConfig)

  # ✅ Publish Allure report
  - task: PublishAllureReport@2
    displayName: 'Generate and Publish Allure Report'
    condition: always()
    inputs:
      testResultsDir: '$(WORKING_DIRECTORY)/allure-results'

  # ✅ Publish Allure report as pipeline artifact
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: 'allure-report'
      artifact: 'allure-report'

  # ✅ Publish JUnit Test Results to Azure DevOps UI
  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(WORKING_DIRECTORY)/results.xml'
      failTaskOnFailedTests: true
      testRunTitle: 'Playwright Test Results'

  # ✅ Publish Playwright HTML report as artifact
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Playwright HTML Report'
    condition: always()
    inputs:
      pathToPublish: '$(WORKING_DIRECTORY)/playwright-report'
      artifactName: 'playwright-report'
      publishLocation: 'Container'

  # ✅ Link to Allure report
  - script: |
      echo "##vso[task.addattachment type=Distributedtask.Core.Summary;name=Allure Report;]$(Build.SourcesDirectory)/allure-report/index.html
