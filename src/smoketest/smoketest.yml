trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '18.x'
  WORKING_DIRECTORY: 'src/smoketest'

steps:
  - checkout: self

  # ✅ Install Node.js
  - task: UseNode@1
    inputs:
      versionSpec: $(NODE_VERSION)
    displayName: 'Install Node.js'

  # ✅ Debug: Check current working directory
  - script: |
      pwd
      ls -la
    displayName: 'Debug: List files in the current directory'
  
  # ✅ Debug working directory folder
  - script: |
      ls -la $(WORKING_DIRECTORY)
    displayName: 'Check smoketest folder'

  # ✅ Install dependencies
  - script: |
      npm ci
    workingDirectory: $(WORKING_DIRECTORY)
    displayName: 'Install dependencies'

  # ✅ Install Playwright browsers and dependencies
  - script: |
      npx playwright install --with-deps
    workingDirectory: $(WORKING_DIRECTORY)
    displayName: 'Install Playwright browsers'

  # ✅ Run Playwright tests
  - script: |
      npx playwright test
    workingDirectory: $(WORKING_DIRECTORY)
    displayName: 'Run Playwright tests'
    env:
      LiveEasUser: $(LiveEasUser)
      MailasourDeviceConfig: $(MailasourDeviceConfig)

  # ✅ Publish JUnit Test Results to Azure DevOps UI
  - task: PublishTestResults@2
    displayName: 'Publish Test Results'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(WORKING_DIRECTORY)/results.xml'
      failTaskOnFailedTests: true
      testRunTitle: 'Playwright Test Results'

  # ✅ Publish Playwright HTML report as artifact
  - task: PublishBuildArtifacts@1
    displayName: 'Publish Playwright HTML Report'
    condition: always()
    inputs:
      pathToPublish: '$(WORKING_DIRECTORY)/playwright-report'
      artifactName: 'playwright-report'
      publishLocation: 'Container'